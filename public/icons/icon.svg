<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Warm paper gradient -->
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCFAF5"/>
      <stop offset="100%" stop-color="#F0E2CB"/>
    </linearGradient>
    <!-- Coral with depth — used for the radiating struts. -->
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D74E1A"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <!-- Tip-disk specular gradient — gives each end-node a 3D "bead" feel. -->
    <radialGradient id="bead" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFC79E"/>
      <stop offset="55%" stop-color="#D94E1A"/>
      <stop offset="100%" stop-color="#7A2A0E"/>
    </radialGradient>
    <radialGradient id="core" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFD7B4"/>
      <stop offset="60%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#5A1F08"/>
    </radialGradient>
  </defs>

  <!-- Squircle paper background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#paper)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" ry="27.5"
        fill="none" stroke="rgba(31,30,27,0.10)" stroke-width="1"/>

  <!-- Mechanical expansion ball: 18 radiating struts from a central core,
       each terminating in a bead. Front-set (12) struts get full opacity +
       bead specular; back-set (6) tone down so the eye reads volume. -->
  <g transform="translate(64 64)">
    <!-- Back struts (faded, drawn first so they're occluded by the core) -->
    <g stroke="url(#coral)" stroke-linecap="round" opacity="0.45">
      <line x1="0" y1="0" x2="44" y2="0" stroke-width="2" transform="rotate(15)"/>
      <line x1="0" y1="0" x2="44" y2="0" stroke-width="2" transform="rotate(75)"/>
      <line x1="0" y1="0" x2="44" y2="0" stroke-width="2" transform="rotate(135)"/>
      <line x1="0" y1="0" x2="44" y2="0" stroke-width="2" transform="rotate(195)"/>
      <line x1="0" y1="0" x2="44" y2="0" stroke-width="2" transform="rotate(255)"/>
      <line x1="0" y1="0" x2="44" y2="0" stroke-width="2" transform="rotate(315)"/>
    </g>
    <!-- Back beads -->
    <g fill="#9A3412" opacity="0.45">
      <circle cx="42.5" cy="11.4" r="3"/>
      <circle cx="11.4" cy="42.5" r="3"/>
      <circle cx="-31.1" cy="31.1" r="3"/>
      <circle cx="-42.5" cy="-11.4" r="3"/>
      <circle cx="-11.4" cy="-42.5" r="3"/>
      <circle cx="31.1" cy="-31.1" r="3"/>
    </g>

    <!-- Front struts (12, every 30°, alternating long/short for a slight
         "compressed/expanded" feel) -->
    <g stroke="url(#coral)" stroke-linecap="round">
      <line x1="0" y1="0" x2="46" y2="0" stroke-width="2.5" transform="rotate(0)"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke-width="2.5" transform="rotate(30)"/>
      <line x1="0" y1="0" x2="46" y2="0" stroke-width="2.5" transform="rotate(60)"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke-width="2.5" transform="rotate(90)"/>
      <line x1="0" y1="0" x2="46" y2="0" stroke-width="2.5" transform="rotate(120)"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke-width="2.5" transform="rotate(150)"/>
      <line x1="0" y1="0" x2="46" y2="0" stroke-width="2.5" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke-width="2.5" transform="rotate(210)"/>
      <line x1="0" y1="0" x2="46" y2="0" stroke-width="2.5" transform="rotate(240)"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke-width="2.5" transform="rotate(270)"/>
      <line x1="0" y1="0" x2="46" y2="0" stroke-width="2.5" transform="rotate(300)"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke-width="2.5" transform="rotate(330)"/>
    </g>

    <!-- Front beads (matching strut tips). Long struts get bigger beads. -->
    <circle cx="46" cy="0" r="4.5" fill="url(#bead)"/>
    <circle cx="36.4" cy="21" r="3.5" fill="url(#bead)"/>
    <circle cx="23" cy="39.8" r="4.5" fill="url(#bead)"/>
    <circle cx="0" cy="42" r="3.5" fill="url(#bead)"/>
    <circle cx="-23" cy="39.8" r="4.5" fill="url(#bead)"/>
    <circle cx="-36.4" cy="21" r="3.5" fill="url(#bead)"/>
    <circle cx="-46" cy="0" r="4.5" fill="url(#bead)"/>
    <circle cx="-36.4" cy="-21" r="3.5" fill="url(#bead)"/>
    <circle cx="-23" cy="-39.8" r="4.5" fill="url(#bead)"/>
    <circle cx="0" cy="-42" r="3.5" fill="url(#bead)"/>
    <circle cx="23" cy="-39.8" r="4.5" fill="url(#bead)"/>
    <circle cx="36.4" cy="-21" r="3.5" fill="url(#bead)"/>

    <!-- Central hub — solid sphere with shading. -->
    <circle r="11" fill="url(#core)"/>
    <!-- Specular highlight on the hub -->
    <ellipse cx="-3" cy="-3" rx="3" ry="2" fill="#FFE6CF" opacity="0.7"/>
  </g>
</svg>
