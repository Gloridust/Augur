<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF7FF"/>
      <stop offset="100%" stop-color="#EADDFF"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61C9"/>
      <stop offset="50%" stop-color="#6750A4"/>
      <stop offset="100%" stop-color="#1D192B"/>
    </linearGradient>
    <radialGradient id="ball" cx="38%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#D0BCFF"/>
      <stop offset="100%" stop-color="#6750A4"/>
    </radialGradient>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- subtle outer ring stroke for depth -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.18"/>

  <!-- inner ball -->
  <circle cx="64" cy="64" r="38" fill="url(#ball)"/>

  <!-- specular highlight -->
  <circle cx="50" cy="48" r="9" fill="#FFFFFF" opacity="0.45"/>

  <!-- small accent dot for the "tab grid" idea -->
  <circle cx="92" cy="88" r="6" fill="#625B71"/>
  <circle cx="100" cy="80" r="3" fill="#625B71" opacity="0.55"/>
</svg>
