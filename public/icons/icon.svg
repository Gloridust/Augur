<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCFAF5"/>
      <stop offset="100%" stop-color="#F0E2CB"/>
    </linearGradient>
  </defs>

  <!-- Squircle paper background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#paper)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" ry="27.5"
        fill="none" stroke="rgba(31,30,27,0.10)" stroke-width="1"/>

  <!-- Fluff ball — 48 thin coral rays radiating from origin, length pattern
       cycles 1.0 / 0.84 / 0.92 / 0.78 / 0.96 / 0.86 / 0.80 / 0.94 / 0.88 /
       0.76 to give an organic silhouette. No core sphere, no tip beads —
       matches the live MagicBall in the greeting. -->
  <g transform="translate(64 64)" stroke="#C2410C" stroke-width="1.6" stroke-linecap="round" opacity="0.92">
    <line x1="0" y1="0" x2="50.0" y2="0" transform="rotate(0)"/>
    <line x1="0" y1="0" x2="42.0" y2="0" transform="rotate(7.5)"/>
    <line x1="0" y1="0" x2="46.0" y2="0" transform="rotate(15)"/>
